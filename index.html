<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин б/у автозапчастей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                       url('https://images.unsplash.com/photo-1583121274602-f18f5b51f6e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover; 
            color: white; 
            padding: 80px 0; 
        }
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .price { font-size: 1.5rem; font-weight: bold; color: #28a745; }
        .spinner-border { width: 3rem; height: 3rem; }
        .cat-number { font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Skoda Octavia 2018 в разборе в Нижнем НовгородеМагазин б/у автозапчастей</h1>
            <p class="lead fs-4">Реальные фото. В наличии в Нижнем Новгороде. Отправка любой ТК по России.</p>
            <button class="btn btn-light btn-lg" onclick="loadProducts()">Смотреть каталог</button>
        </div>
    </section>

    <!-- Каталог товаров прямо на главной -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row mb-3">
                <div class="col">
                    <div class="input-group">
                        <input type="text" id="search" class="form-control" placeholder="Поиск по названию...">
                        <button class="btn btn-outline-secondary" onclick="filterProducts()">Фильтр</button>
                    </div>
                </div>
            </div>
            <h2 class="text-center mb-5">Каталог товаров (<span id="count">0</span>)</h2>
            <div id="products-grid" class="row g-4">
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка из Google Sheets...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Контакты (если нужно) -->
    <section class="py-5">
        <div class="container text-center">
            <h2>Связаться с нами</h2>
            <p><a href="tel:+79001234567">+7 (900) 123‑45‑67</a></p>
            <p>Email: parts@bu-auto.ru</p>
        </div>
    </section>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ТВОЯ CSV-ССЫЛКА (правильная, как мы обсуждали)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqoUEksexahz9qmPIH4tnt7_pv0s0zuioF43jt9ftE264RW8MlRomCK8F-2GEz_w/pub?gid=549941518&single=true&output=csv';

        let allProducts = [];

        // Парсинг CSV под твою структуру:
        // A=0 (номер), B=1 (статус), C=2 (название), D=3 (катал. номер), E=4 (цена)
        function parseCSV(csvText) {
            const rows = csvText.split('\n')
                .map(line => line
                    .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                    .map(cell => cell.trim().replace(/^"|"$/g, '').replace(/""/g, ''))
                )
                .filter(row => row.length >= 5 && row[0]);

            return rows
                .filter(row => row[1] === '1') // только B=1
                .map(row => ({
                    name       : row[2] || 'Без названия',
                    catNumber  : row[3] || '',
                    price      : row[4] || 'Договорная'
                }));
        }

        async function loadProducts() {
            const grid = document.getElementById('products-grid');

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('CSV недоступен');
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                renderProducts(allProducts);
                document.getElementById('count').textContent = allProducts.length;

            } catch (error) {
                console.error('Ошибка:', error);
                grid.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">
                            <h4>Ошибка загрузки</h4>
                            <p>Проверьте CSV-ссылку: ${CSV_URL}</p>
                            <p><strong>Ошибка:</strong> ${error.message}</p>
                        </div>
                    </div>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            products.forEach(product => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4';
                col.innerHTML = `
                    <div class="card h-100 shadow">
                        <div class="card-header text-center bg-light text-muted">
                            Нет фото
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="cat-number mb-0">Кат. № ${product.catNumber}</p>
                            <p class="price mt-auto">${product.price} ₽</p>
                            <a href="tel:+79001234567" class="btn btn-success mt-2">Купить</a>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function filterProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const name = (p.name || '').toLowerCase();
                const num  = (p.catNumber || '').toLowerCase();
                return name.includes(query) || num.includes(query);
            });
            renderProducts(filtered);
            document.getElementById('count').textContent = filtered.length;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            if (!CSV_URL || CSV_URL === 'https://docs.google.com/...') {
                document.getElementById('products-grid').innerHTML = '<div class="col-12 alert alert-warning text-center">⚠ Вставьте правильную CSV_URL!</div>';
            } else {
                // можно по загрузке страницы сразу грузить каталог
                // loadProducts();  // раскомментировать, если каталог нужен сразу при заходе
            }
        });
    </script>
</body>
</html>
