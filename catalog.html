<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог б/у автозапчастей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                       url('https://images.unsplash.com/photo-1583121274602-f18f5b51f6e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover; 
            color: white; 
            padding: 80px 0; 
        }
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .price { font-size: 1.5rem; font-weight: bold; color: #28a745; }
        .spinner-border { width: 3rem; height: 3rem; }
        .cat-number { font-size: 0.9rem; color: #6c757d; }
        .hero h1 { margin-bottom: 0.5rem; }
        .hero p { opacity: 0.9; font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Каталог товаров</h1>
            <p class="lead">Без встроенных фото из Яндекс Диска</p>
            <a href="index.html" class="btn btn-light me-3">Главная</a>
            <button class="btn btn-outline-light" onclick="loadProducts()">Обновить каталог</button>
        </div>
    </section>

    <!-- Каталог -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="search" class="form-control" placeholder="Поиск по названию/описанию...">
                        <button class="btn btn-outline-secondary" onclick="filterProducts()">Фильтр</button>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="badge bg-success fs-6" id="count">0</span> товаров (статус 1)
                </div>
            </div>
            <div id="products-grid" class="row g-4">
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка данных из Google Sheets...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Вставь свою CSV-ссылку из Google Sheets
        const CSV_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vRqoUEksexahz9qmPIH4tnt7_pv0s0zuioF43jt9ftE264RW8MlRomCK8F-2GEz_w/pub?gid=549941518&single=true&output=csv;

        let allProducts = [];

        // Парсинг CSV: A=0, B=1 (статус), C=2 (название), D=3 (кат. номер),
        // E=4 (цена), F=5 (subst), G=6 (шаблон), H=7 (описание)
        function parseCSV(csvText) {
            const rows = csvText.split('\n')
                .map(line => line
                    .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                    .map(cell => cell.trim().replace(/^"|"$/g, '').replace(/""/g, '"'))
                )
                .filter(row => row.length >= 8 && row[0] && row[1] === '1'); // только B=1

            return rows.map(row => ({
                name       : row[2] || 'Без названия',
                catNumber  : row[3] || '',
                price      : row[4] || 'Договорная',
                // F и G игнорируем (фото больше не встраиваются)
                desc       : row[7] || ''
            }));
        }

        async function loadProducts() {
            const grid = document.getElementById('products-grid');

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} – проверьте CSV`);
                }
                const csvText = await response.text();

                allProducts = parseCSV(csvText);
                renderProducts(allProducts);
                document.getElementById('count').textContent = allProducts.length;

            } catch (error) {
                console.error('Ошибка при загрузке каталога:', error);
                grid.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">
                            <h5>Ошибка загрузки данных</h5>
                            <p>Проверьте, чтобы Google Sheets был опубликован в веб как CSV.</p>
                            <p><small>Ошибка: ${error.message}</small></p>
                        </div>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.length
                ? ''
                : '<div class="col-12"><div class="alert alert-info text-center">Нет товаров со статусом 1</div></div>';

            products.forEach((product, idx) => {
                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4';
                card.innerHTML = `
                    <div class="card h-100 shadow">
                        <!-- Пустой блок без изображения -->
                        <div class="card-header text-center bg-light text-muted">
                            Нет фото
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h6 class="card-title mb-0">${product.name}</h6>
                            <small class="cat-number mb-1">Кат. № ${product.catNumber}</small>
                            <div class="price mt-auto mb-2">${product.price} ₽</div>
                            <p class="card-text small flex-grow-1">${product.desc}</p>
                            <a href="tel:+79001234567" class="btn btn-success btn-sm mt-auto">Заказать</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            if (!query) {
                renderProducts(allProducts);
                document.getElementById('count').textContent = allProducts.length;
                return;
            }

            const filtered = allProducts.filter(p => {
                const name = (p.name || '').toLowerCase();
                const desc = (p.desc || '').toLowerCase();
                const num  = p.catNumber || '';
                return name.includes(query) || desc.includes(query) || num.includes(query);
            });

            renderProducts(filtered);
            document.getElementById('count').textContent = filtered.length;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('search');
            input.addEventListener('keyup', e => {
                if (e.key === 'Enter') filterProducts();
            });

            if (CSV_URL === 'YOUR_CSV_URL_HERE') {
                document.getElementById('products-grid').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning text-center">
                            <h5>Вставьте CSV_URL</h5>
                            <p>Скопируйте ссылку на CSV из Google Sheets и вставьте в код.</p>
                        </div>
                    </div>
                `;
            } else {
                loadProducts();
            }
        });
    </script>
</body>
</html>
