<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог б/у автозапчастей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1583121274602-f18f5b51f6e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover; color: white; padding: 80px 0; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .price { font-size: 1.5rem; font-weight: bold; color: #28a745; }
        .spinner-border { width: 3rem; height: 3rem; }
    </style>
</head>
<body>
    <!-- Hero -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Каталог товаров</h1>
            <p class="lead">Цены и фото из Google Таблицы (автообновление)</p>
            <a href="index.html" class="btn btn-light me-3">На главную</a>
            <button class="btn btn-outline-light" onclick="loadProducts()">Обновить каталог</button>
        </div>
    </section>

    <!-- Каталог -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row mb-3">
                <div class="col">
                    <div class="input-group">
                        <input type="text" id="search" class="form-control" placeholder="Поиск по названию...">
                        <button class="btn btn-outline-secondary" onclick="filterProducts()">Фильтр</button>
                    </div>
                </div>
            </div>
            <h2 class="text-center mb-5">Все б/у запчасти (<span id="count">0</span>)</h2>
            <div id="products-grid" class="row g-4">
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка из Google Sheets...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    <script>
        const CSV_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vRqoUEksexahz9qmPIH4tnt7_pv0s0zuioF43jt9ftE264RW8MlRomCK8F-2GEz_w/pub?gid=549941518&single=true&output=csv; // <- Замените на вашу CSV-ссылку из Publish to web
        let allProducts = [];

        // Парсинг CSV (A=название, B=описание, D=фото, E=цена)
        function parseCSV(csvText) {
            const rows = csvText.split('\n').map(row => {
                const cols = row.split(',').map(cell => cell.trim().replace(/^"|"$/g, ''));
                return cols.length > 4 ? cols : [];
            }).filter(row => row.length > 0 && row[0].trim() !== ''); // Убрать заголовки/пустые

            return rows.map(row => ({
                name: row[0] || 'Без названия',
                desc: row[1] || '',
                photo: row[3] || 'default.jpg', // Столбец D
                price: row[4] || 'Договорная'   // Столбец E
            }));
        }

        async function loadProducts() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('CSV недоступен');
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                renderProducts(allProducts);
                document.getElementById('count').textContent = allProducts.length;
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('products-grid').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">
                            <h4>Ошибка загрузки</h4>
                            <p>Проверьте CSV-ссылку в коде. Должна быть публичной: File > Share > Publish to web > CSV.</p>
                            <p><strong>Пример ошибки:</strong> ${error.message}</p>
                        </div>
                    </div>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            products.forEach(product => {
                const thumbUrl = `https://disk.yandex.ru/i/${product.photo}?size=400x400`;
                const origUrl = `https://disk.yandex.ru/d/${product.photo}`;
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4';
                col.innerHTML = `
                    <div class="card h-100 shadow">
                        <a href="${origUrl}" data-lightbox="gal" data-title="${product.name}<br>${product.desc}<br><strong>${product.price} ₽</strong>">
                            <img src="${thumbUrl}" class="card-img-top" alt="${product.name}" loading="lazy">
                        </a>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="price mt-auto">${product.price} ₽</p>
                            <p class="card-text flex-grow-1">${product.desc}</p>
                            <a href="tel:+79001234567" class="btn btn-success mt-2">Купить</a>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function filterProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
            renderProducts(filtered);
            document.getElementById('count').textContent = filtered.length;
        }

        // Инициализация
        window.onload = () => {
            if (CSV_URL === 'YOUR_CSV_URL_HERE') {
                document.getElementById('products-grid').innerHTML = '<div class="col-12 alert alert-warning">Вставьте CSV_URL в код!</div>';
            } else {
                loadProducts();
            }
        };
    </script>
</body>
</html>
