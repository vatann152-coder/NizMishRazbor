<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог б/у автозапчастей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1583121274602-f18f5b51f6e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover; color: white; padding: 80px 0; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .price { font-size: 1.5rem; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <!-- Hero -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Каталог товаров</h1>
            <a href="index.html" class="btn btn-light">На главную</a>
        </div>
    </section>

    <!-- Каталог -->
    <section id="catalog" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">Все б/у запчасти</h2>
            <div id="products-grid" class="row g-4">
                <!-- Товары генерируются JS -->
                <div class="col-12 text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    <script>
        const CSV_URL = 'YOUR_CSV_URL'; // <- Вставьте вашу CSV-ссылку из Google Sheets

        async function loadProducts() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.trim().replace(/"/g, '')));
                const headers = rows[0];
                const products = rows.slice(1).filter(row => row[0]); // Пропуск пустых

                const grid = document.getElementById('products-grid');
                grid.innerHTML = ''; // Очистка

                products.forEach(product => {
                    const name = product[0] || 'Без названия';
                    const desc = product[1] || '';
                    const photoFile = product[3] || 'photo_default.jpg'; // Столбец D
                    const price = product[4] || 'Договорная'; // Столбец E
                    const thumbUrl = `https://disk.yandex.ru/i/${photoFile}?size=400`; // Thumb
                    const origUrl = `https://disk.yandex.ru/d/${photoFile}`; // Оригинал

                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4';
                    col.innerHTML = `
                        <div class="card h-100 shadow">
                            <a href="${origUrl}" data-lightbox="gal" data-title="${name}. ${desc}<br>Цена: ${price} ₽">
                                <img src="${thumbUrl}" class="card-img-top" alt="${name}">
                            </a>
                            <div class="card-body">
                                <h5 class="card-title">${name}</h5>
                                <p class="price">${price} ₽</p>
                                <p class="card-text">${desc}</p>
                                <a href="tel:+79001234567" class="btn btn-success w-100">Купить</a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(col);
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('products-grid').innerHTML = '<div class="col-12"><p class="alert alert-danger">Ошибка загрузки каталога. Проверьте CSV-ссылку.</p></div>';
            }
        }

        // Загрузка при открытии страницы
        window.onload = loadProducts;
    </script>
</body>
</html>
